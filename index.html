<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PHÒNG TRỌ SÓI GHẺ</title>

<style>
body{font-family:Arial;background:#0f172a;color:#fff;margin:0;padding:10px;}
h2{text-align:center;}

.info{
  background:#111827;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  text-align:center;
}

.total{
  text-align:center;
  font-size:18px;
  margin-bottom:10px;
}

.room{border-radius:12px;margin-bottom:10px;overflow:hidden;}
.roomHeader{padding:12px;display:flex;justify-content:space-between;cursor:pointer;}
.roomContent{display:none;padding:10px;background:#1e293b;}
.room.open .roomContent{display:block;}

.red{background:#7f1d1d;}
.yellow{background:#78350f;}
.green{background:#065f46;}

input{width:90px;padding:8px;margin:5px;border-radius:8px;border:none;}
.name{width:140px;}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:5px;
  font-size:14px;
  width:100%;
}

.calc{background:#22c55e;color:#fff;}
.paid{background:#3b82f6;color:#fff;}
.print{background:#f59e0b;color:#fff;}
.clear{background:#ef4444;color:#fff;}

.result{margin-top:8px;font-size:16px;color:#00ffcc;font-weight:bold;}
.small{font-size:13px;color:#60a5fa;}
.warn{color:#f87171;text-align:center;margin-bottom:10px;}
</style>
</head>

<body>

<h2>🏠 QUẢN LÝ PHÒNG TRỌ VIP</h2>

<div class="info">
💡 5,000đ/kWh | 🚿 10,000đ/m³
</div>

<div class="total" id="total"></div>
<div class="warn" id="warn"></div>

<div id="list"></div>

<script>
let data = JSON.parse(localStorage.getItem("troVIP")||"{}");

function save(){localStorage.setItem("troVIP",JSON.stringify(data));}

function toggle(el){el.parentElement.classList.toggle("open");}

function getNow(){return new Date().toLocaleString("vi-VN");}

function status(room){
  if(!room.total) return {c:"red",t:"Chưa tính"};
  if(room.paid) return {c:"green",t:"Đã thu"};
  return {c:"yellow",t:"Chưa thu"};
}

function render(){
  let html="",sum=0,unpaid=0;

  for(let i=1;i<=7;i++){
    let r=data[i]||{};
    let s=status(r);

    if(r.total) sum+=r.total;
    if(r.total && !r.paid) unpaid++;

    html+=`
    <div class="room ${s.c}">
      <div class="roomHeader" onclick="toggle(this)">
        <div>
          Phòng ${i} - ${r.name||""}<br>
          <small>${s.t}</small>
        </div>
        <div>${r.total? r.total.toLocaleString()+"đ":""}</div>
      </div>

      <div class="roomContent">

        👤 <input class="name" placeholder="Tên" value="${r.name||''}" onchange="saveName(${i},this.value)"><br>

        💡 Điện:<br>
        <input id="e_old_${i}" value="${r.e_old||r.next_e||''}">
        <input id="e_new_${i}" placeholder="mới"><br>

        🚿 Nước:<br>
        <input id="w_old_${i}" value="${r.w_old||r.next_w||''}">
        <input id="w_new_${i}" placeholder="mới"><br>

        <button class="calc" onclick="calc(${i})">TÍNH TIỀN</button>
        <button class="paid" onclick="togglePaid(${i})">ĐÃ THU</button>
        <button class="print" onclick="printBill(${i})">IN HÓA ĐƠN</button>
        <button class="clear" onclick="clearRoom(${i})">XÓA</button>

        <div class="result">${r.total?"👉 "+r.total.toLocaleString()+"đ":""}</div>

        <div class="small">
          ${r.next_e?`Tháng sau: ${r.next_e} / ${r.next_w}`:""}
        </div>

        <div class="small">
          ${r.paid?"Đã thu: "+r.date:""}
        </div>

      </div>
    </div>
    `;
  }

  document.getElementById("list").innerHTML=html;
  document.getElementById("total").innerText="💰 Tổng: "+sum.toLocaleString()+"đ";
  document.getElementById("warn").innerText=
    unpaid? "⚠️ "+unpaid+" phòng chưa thu tiền":"";
}

function saveName(i,name){
  data[i]={...data[i],name};
  save();
}

function calc(i){
  let price=(i===7)?900000:1000000;

  let e_old=+document.getElementById(`e_old_${i}`).value||0;
  let e_new=+document.getElementById(`e_new_${i}`).value||0;
  let w_old=+document.getElementById(`w_old_${i}`).value||0;
  let w_new=+document.getElementById(`w_new_${i}`).value||0;

  let total=price+(e_new-e_old)*5000+(w_new-w_old)*10000;

  data[i]={...data[i],e_old,w_old,next_e:e_new,next_w:w_new,total,paid:false};

  save();render();
}

function togglePaid(i){
  if(!data[i]) return;
  data[i].paid=!data[i].paid;
  data[i].date=data[i].paid?getNow():"";
  save();render();
}

function clearRoom(i){
  delete data[i];
  save();render();
}

function printBill(i){
  let r=data[i];
  if(!r) return alert("Chưa có dữ liệu");

  let win=window.open("","","width=400,height=600");
  win.document.write(`
  <h3>HÓA ĐƠN PHÒNG ${i}</h3>
  <p>Khách: ${r.name||""}</p>
  <p>${r.total.toLocaleString()}đ</p>
  <p>${r.date||""}</p>
  `);
  win.print();
}

render();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QL Trọ VIP FULL</title>

<style>
body{font-family:-apple-system,system-ui;background:#0f172a;color:#fff;margin:0;padding:10px}
h2{text-align:center}

.top{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.box{background:#1e293b;border-radius:14px;padding:12px;text-align:center}
.box div:first-child{font-size:18px;font-weight:bold}

.room{background:#1e293b;border-radius:16px;margin-bottom:10px;overflow:hidden}
.header{display:flex;justify-content:space-between;padding:14px;font-size:17px;cursor:pointer}
.header.done{background:#14532d}
.header.unpaid{background:#78350f}
.header.late{background:#7f1d1d}

.content{max-height:0;overflow:hidden;transition:.3s;background:#334155}
.room.open .content{max-height:1000px;padding:12px}

label{display:block;margin-top:6px;font-size:13px}
input{width:100%;padding:14px;font-size:16px;border:none;border-radius:10px;margin-top:4px}

button{width:100%;padding:14px;margin-top:8px;border:none;border-radius:10px;color:#fff}
.calc{background:#16a34a}
.paid{background:#2563eb}
.fullpaid{background:#22c55e}
.print{background:#9333ea}
.clear{background:#dc2626}
</style>
</head>

<body>

<h2>🏠 QL TRỌ VIP FULL</h2>

<div class="top">
  <div class="box"><div id="sumBox">0đ</div><div>Tổng</div></div>
  <div class="box"><div id="unpaidBox">0</div><div>Chưa thu</div></div>
  <div class="box"><div id="realBox">0đ</div><div>Đã thu</div></div>
</div>

<div id="list"></div>

<script>
let data = JSON.parse(localStorage.getItem("tro")||"{}");
let m = new Date().getMonth()+1;
let openRoom = null;
const TOTAL = 8;

function save(){
  localStorage.setItem("tro",JSON.stringify(data));
}

function getRoom(i){
  if(!data[m]) data[m]={};
  return data[m][i]||{};
}

function toggle(i){
  openRoom = openRoom==i?null:i;
  render();
}

function render(){
  let html="",sum=0,unpaid=0,real=0;
  let today=new Date().getDate();

  for(let i=1;i<=TOTAL;i++){
    let r=getRoom(i);
    let total=r.total||0;
    let debt=total+(r.oldDebt||0)-(r.paid||0);

    sum+=total;
    real+=(r.paid||0);
    if(debt>0) unpaid++;

    let cls="unpaid";
    if(debt<=0 && total>0) cls="done";
    if(r.due && today>r.due) cls="late";

    html+=`
    <div class="room ${openRoom==i?'open':''}">
      <div class="header ${cls}" onclick="toggle(${i})">
        <div>Phòng ${i} - ${r.name||""}</div>
        <div>${total?total.toLocaleString()+"đ":"--"}</div>
      </div>

      <div class="content">

        <label>👤 Tên khách</label>
        <input value="${r.name||""}" onchange="setName(${i},this.value)">

        <label>⚡ Điện</label>
        <input id="eo${i}" placeholder="Điện cũ" value="${r.e_old||''}">
        <input id="en${i}" placeholder="Điện mới" value="${r.next_e||''}">

        <label>🚿 Nước</label>
        <input id="wo${i}" placeholder="Nước cũ" value="${r.w_old||''}">
        <input id="wn${i}" placeholder="Nước mới" value="${r.next_w||''}">

        <label>💰 Thanh toán</label>
        <input id="paid${i}" placeholder="Đã trả" value="${r.paid||''}">
        <input id="oldDebt${i}" placeholder="Nợ cũ" value="${r.oldDebt||''}">
        <input id="deposit${i}" placeholder="Tiền cọc" value="${r.deposit||''}">

        <label>📅 Ngày thu</label>
        <input id="due${i}" value="${r.due||''}" onchange="saveDue(${i},this.value)">

        <button class="calc" onclick="calc(${i})">TÍNH</button>
        <button class="paid" onclick="savePaid(${i})">LƯU TRẢ</button>
        <button class="fullpaid" onclick="payFull(${i})">FULL</button>
        <button class="print" onclick="bill(${i})">IN</button>
        <button class="clear" onclick="del(${i})">XÓA</button>

      </div>
    </div>`;
  }

  document.getElementById("list").innerHTML=html;
  document.getElementById("sumBox").innerText=sum.toLocaleString()+"đ";
  document.getElementById("unpaidBox").innerText=unpaid;
  document.getElementById("realBox").innerText=real.toLocaleString()+"đ";
}

function setName(i,v){
  data[m][i]={...getRoom(i),name:v};
  save();
}

function saveDue(i,v){
  data[m][i]={...getRoom(i),due:+v};
  save();
}

function calc(i){
  let r=getRoom(i);

  let eo=+document.getElementById("eo"+i).value||0;
  let en=+document.getElementById("en"+i).value||0;
  let wo=+document.getElementById("wo"+i).value||0;
  let wn=+document.getElementById("wn"+i).value||0;

  let price=(i==7)?900000:1000000;
  let total=price+(en-eo)*5000+(wn-wo)*10000;

  data[m][i]={...r,e_old:eo,next_e:en,w_old:wo,next_w:wn,total};
  save(); render();
}

function savePaid(i){
  data[m][i]={
    ...getRoom(i),
    paid:+document.getElementById("paid"+i).value||0,
    oldDebt:+document.getElementById("oldDebt"+i).value||0,
    deposit:+document.getElementById("deposit"+i).value||0
  };
  save(); render();
}

function payFull(i){
  let r=getRoom(i);
  if(!r.total) return;
  data[m][i]={...r,paid:r.total,oldDebt:0};
  save(); render();
}

function del(i){
  delete data[m][i];
  save(); render();
}

/* ✅ HÓA ĐƠN FIX CHUẨN */
function bill(i){
  let r=getRoom(i);
  if(!r.total){alert("Chưa tính!");return;}

  let eo=r.e_old||0,en=r.next_e||0;
  let wo=r.w_old||0,wn=r.next_w||0;

  let eu=en-eo,wu=wn-wo;
  let em=eu*5000,wm=wu*10000;
  let room=(i==7)?900000:1000000;

  let old=r.oldDebt||0,paid=r.paid||0;
  let total=room+em+wm;
  let final=total+old-paid;

  let w=window.open("");

  let html = `
  <html>
  <body style="font-family:sans-serif;padding:20px">
  <h2>HÓA ĐƠN PHÒNG ${i}</h2>
  <p>Khách: ${r.name||""}</p>
  <p>Điện: ${eo} → ${en} = ${em.toLocaleString()}đ</p>
  <p>Nước: ${wo} → ${wn} = ${wm.toLocaleString()}đ</p>
  <p>Tiền phòng: ${room.toLocaleString()}đ</p>
  <p>Nợ cũ: ${old.toLocaleString()}đ</p>
  <p>Đã trả: ${paid.toLocaleString()}đ</p>
  <h3>TỔNG: ${final.toLocaleString()}đ</h3>
  </body>
  </html>
  `;

  w.document.write(html);
  w.document.close();
  w.print();
}

render();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QL Trọ PRO DARK</title>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --card-soft:#273449;

  --content:#334155;
  --input:#475569;

  --text:#e2e8f0;
  --sub:#94a3b8;

  --electric:#facc15;
  --water:#38bdf8;
  --money:#c084fc;

  --green:#22c55e;
  --yellow:#f59e0b;
  --red:#ef4444;
  --blue:#3b82f6;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:var(--bg);
  color:var(--text);
  margin:0;
  padding:12px;
}

h2{text-align:center;margin-bottom:14px;}

select{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:none;
  background:var(--card);
  color:var(--text);
  margin-bottom:14px;
}

.top{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}

.box{
  background:var(--card);
  border-radius:16px;
  padding:16px;
  text-align:center;
}

.big{font-size:20px;font-weight:700;}
.small{font-size:12px;color:var(--sub);}

.room{
  background:var(--card);
  border-radius:18px;
  margin-bottom:12px;
  overflow:hidden;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:14px;
  cursor:pointer;
}

.title{font-weight:600;}

.meta{font-size:12px;margin-top:3px;}
.meta span{margin-right:10px;}

.meta .e{color:var(--electric);}
.meta .w{color:var(--water);}

.price{font-weight:700;color:var(--money);}
.old{font-size:12px;color:var(--sub);}

/* STATUS */
.status{
  font-size:12px;
  margin-top:5px;
  padding:4px 10px;
  border-radius:999px;
  display:inline-block;
}

.done{background:rgba(34,197,94,0.2);color:#4ade80;}
.unpaid{background:rgba(245,158,11,0.2);color:#fbbf24;}
.empty{background:rgba(148,163,184,0.2);color:#cbd5f5;}

/* 🔥 CONTENT MÀU DARK NHẸ */
.content{
  max-height:0;
  overflow:hidden;
  transition:0.3s;
  background:var(--content);
  color:var(--text);
}

.room.open .content{
  max-height:500px;
  padding:12px;
  border-top:1px solid #475569;
}

/* input */
input{
  width:80px;
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
  color:#fff;
}

/* màu input dịu */
.electric{background:#78350f;}
.water{background:#0c4a6e;}
.name{width:150px;background:var(--input);}

/* button */
button{
  width:100%;
  margin-top:6px;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:600;
  color:#fff;
}

.calc{background:#16a34a;}
.paid{background:#2563eb;}
.print{background:#9333ea;}
.clear{background:#dc2626;}
</style>
</head>

<body>

<h2>🏠 SÓI GHẺ</h2>

<select id="month"></select>

<div class="top">
  <div class="box">
    <div class="big" id="sumBox">0đ</div>
    <div class="small">Tổng tháng</div>
  </div>
  <div class="box">
    <div class="big" id="unpaidBox">0</div>
    <div class="small">Chưa thu</div>
  </div>
</div>

<div id="list"></div>

<script>
let m = localStorage.getItem("m") || new Date().getMonth()+1;
let data = JSON.parse(localStorage.getItem("tro")||"{}");

const monthEl = document.getElementById("month");

function save(){
  localStorage.setItem("tro",JSON.stringify(data));
  localStorage.setItem("m",m);
}

function initMonth(){
  let h="";
  for(let i=1;i<=12;i++){
    h+=`<option value="${i}" ${i==m?"selected":""}>Tháng ${i}</option>`;
  }
  monthEl.innerHTML=h;
}

monthEl.onchange = ()=>{
  m=monthEl.value;
  save();
  render();
};

function getRoom(i){
  if(!data[m]) data[m]={};
  return data[m][i]||{};
}

function getPrev(i){
  for(let k=m-1;k>=1;k--){
    if(data[k] && data[k][i] && data[k][i].next_e){
      return data[k][i];
    }
  }
  return {};
}

function auto(i){
  let r=getRoom(i),p=getPrev(i);
  if(!r.e_old && p.next_e) r.e_old=p.next_e;
  if(!r.w_old && p.next_w) r.w_old=p.next_w;
  data[m][i]=r;
}

function render(){
  let html="";
  let totalMoney=0;
  let unpaidCount=0;

  for(let i=1;i<=7;i++){
    auto(i);

    let r=getRoom(i);
    let p=getPrev(i);

    let oldE = p.next_e ?? r.e_old ?? 0;
    let oldW = p.next_w ?? r.w_old ?? 0;

    if(r.total) totalMoney+=r.total;
    if(r.total && !r.paid) unpaidCount++;

    let statusText="Chưa tính",statusClass="empty";
    if(r.total){
      if(r.paid){statusText="Đã thu";statusClass="done";}
      else{statusText="Chưa thu";statusClass="unpaid";}
    }

    html+=`
    <div class="room">
      <div class="header" onclick="this.parentElement.classList.toggle('open')">
        <div>
          <div class="title">Phòng ${i} - ${r.name||""}</div>
          <div class="meta">
            <span class="e">⚡ ${oldE}</span>
            <span class="w">🚿 ${oldW}</span>
          </div>
          <div class="status ${statusClass}">${statusText}</div>
        </div>

        <div>
          <div class="price">${r.total? r.total.toLocaleString()+"đ":"--"}</div>
          <div class="old">${p.total? p.total.toLocaleString()+"đ":"0đ"}</div>
        </div>
      </div>

      <div class="content">
        <input class="name" value="${r.name||""}" onchange="setName(${i},this.value)"><br>

        ⚡ <input class="electric" id="eo${i}" value="${oldE}">
        <input class="electric" id="en${i}" value="${r.next_e||""}"><br>

        🚿 <input class="water" id="wo${i}" value="${oldW}">
        <input class="water" id="wn${i}" value="${r.next_w||""}"><br>

        <button class="calc" onclick="calc(${i})">TÍNH</button>
        <button class="paid" onclick="togglePaid(${i})">ĐÃ THU</button>
        <button class="print" onclick="bill(${i})">IN</button>
        <button class="clear" onclick="del(${i})">XÓA</button>
      </div>
    </div>
    `;
  }

  document.getElementById("list").innerHTML = html;
  document.getElementById("sumBox").innerText = totalMoney.toLocaleString()+"đ";
  document.getElementById("unpaidBox").innerText = unpaidCount;
}

function setName(i,v){
  data[m][i]={...getRoom(i),name:v};
  save();
}

function calc(i){
  let e_old=+document.getElementById("eo"+i).value||0;
  let e_new=+document.getElementById("en"+i).value||0;
  let w_old=+document.getElementById("wo"+i).value||0;
  let w_new=+document.getElementById("wn"+i).value||0;

  let price=(i==7)?900000:1000000;
  let total=price+(e_new-e_old)*5000+(w_new-w_old)*10000;

  data[m][i]={...getRoom(i),e_old,w_old,next_e:e_new,next_w:w_new,total,paid:false};

  save();
  render();
}

function togglePaid(i){
  let r=getRoom(i);
  r.paid=!r.paid;
  data[m][i]=r;
  save();
  render();
}

function del(i){
  delete data[m][i];
  save();
  render();
}

function bill(i){
  let r=getRoom(i);
  let w=window.open("");
  w.document.write(`<h3>Phòng ${i}</h3><p>${r.total}</p>`);
  w.print();
}

initMonth();
render();
</script>

</body>
</html>

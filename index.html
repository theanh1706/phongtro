<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QL Trọ PRO</title>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --content:#334155;
  --input:#475569;
  --text:#e2e8f0;
  --sub:#94a3b8;

  --electric:#facc15;
  --water:#38bdf8;
  --money:#c084fc;

  --green:#22c55e;
  --yellow:#f59e0b;
  --red:#ef4444;
  --blue:#3b82f6;
}

body{font-family:system-ui;background:var(--bg);color:var(--text);padding:12px;}
h2{text-align:center;}

select{
  width:100%;padding:12px;border-radius:12px;border:none;
  background:var(--card);color:#fff;margin-bottom:12px;
}

.top{
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;margin-bottom:12px;
}

.box{background:var(--card);border-radius:16px;padding:14px;text-align:center;}

.room{background:var(--card);border-radius:18px;margin-bottom:12px;overflow:hidden;}

.header{
  display:flex;justify-content:space-between;
  padding:14px;cursor:pointer;
}

.content{
  max-height:0;overflow:hidden;transition:0.3s;
  background:var(--content);
}
.room.open .content{max-height:700px;padding:12px;}

input{
  width:80px;padding:10px;margin:5px;
  border-radius:10px;border:none;color:#fff;
}

.name{width:150px;background:var(--input);}
.electric{background:#78350f;}
.water{background:#0c4a6e;}
.money{background:#312e81;}
.debtold{background:#7f1d1d;}
.deposit{background:#065f46;} /* xanh lá đậm cho tiền cọc */

button{
  width:100%;margin-top:6px;padding:12px;
  border:none;border-radius:12px;font-weight:600;color:#fff;
}

.calc{background:#16a34a;}
.paid{background:#2563eb;}
.print{background:#9333ea;}
.clear{background:#dc2626;}

.status{font-size:12px;margin-top:4px;}
.done{color:#4ade80;}
.unpaid{color:#fbbf24;}
.empty{color:#94a3b8;}
</style>
</head>

<body>

<h2>🏠 SÓI GHẺ</h2>

<select id="month"></select>

<div class="top">
  <div class="box">
    <div id="sumBox">0đ</div>
    <div>Tổng tháng</div>
  </div>
  <div class="box">
    <div id="unpaidBox">0</div>
    <div>Chưa thu</div>
  </div>
</div>

<div id="list"></div>

<script>
let m = localStorage.getItem("m") || new Date().getMonth()+1;
let data = JSON.parse(localStorage.getItem("tro")||"{}");

let openRoom = null;

const monthEl = document.getElementById("month");

function save(){
  localStorage.setItem("tro",JSON.stringify(data));
  localStorage.setItem("m",m);
}

function initMonth(){
  let h="";
  for(let i=1;i<=12;i++){
    h+=`<option value="${i}" ${i==m?"selected":""}>Tháng ${i}</option>`;
  }
  monthEl.innerHTML=h;
}

monthEl.onchange = ()=>{m=monthEl.value;save();render();};

function getRoom(i){
  if(!data[m]) data[m]={};
  return data[m][i]||{};
}

function getPrev(i){
  for(let k=m-1;k>=1;k--){
    if(data[k] && data[k][i] && data[k][i].next_e){
      return data[k][i];
    }
  }
  return {};
}

function auto(i){
  let r=getRoom(i),p=getPrev(i);
  if(!r.e_old && p.next_e) r.e_old=p.next_e;
  if(!r.w_old && p.next_w) r.w_old=p.next_w;
  data[m][i]=r;
}

function toggleRoom(i, el){
  if(el.classList.contains("open")){
    el.classList.remove("open");
    openRoom = null;
  }else{
    openRoom = i;
    render();
  }
}

function render(){
  let html="";
  let totalMoney=0;
  let unpaidCount=0;

  for(let i=1;i<=7;i++){
    auto(i);

    let r=getRoom(i);
    let p=getPrev(i);

    let oldE = p.next_e ?? r.e_old ?? 0;
    let oldW = p.next_w ?? r.w_old ?? 0;

    let currentDebt = r.total ? (r.total - (r.paid||0)) : 0;
    let oldDebt = r.oldDebt || 0;
    let totalDebt = currentDebt + oldDebt;

    if(r.total) totalMoney+=r.total;
    if(totalDebt>0) unpaidCount++;

    let statusText="Chưa tính",statusClass="empty";
    if(r.total){
      if(totalDebt<=0){statusText="Đã thu";statusClass="done";}
      else{statusText="Còn nợ";statusClass="unpaid";}
    }

    html+=`
    <div class="room ${openRoom==i?'open':''}">
      <div class="header" onclick="toggleRoom(${i}, this.parentElement)">
        <div>
          <div>Phòng ${i} - ${r.name||""}</div>
          <div style="font-size:12px;color:#94a3b8;">⚡ ${oldE} | 🚿 ${oldW}</div>
          <div class="status ${statusClass}">${statusText}</div>
        </div>

        <div style="color:#c084fc;font-weight:700;">
          ${r.total? r.total.toLocaleString()+"đ":"--"}
        </div>
      </div>

      <div class="content">
        <input class="name" value="${r.name||""}" onchange="setName(${i},this.value)"><br>

        ⚡ <input type="number" class="electric" id="eo${i}" value="${oldE}">
        <input type="number" class="electric" id="en${i}" value="${r.next_e||""}"><br>

        🚿 <input type="number" class="water" id="wo${i}" value="${oldW}">
        <input type="number" class="water" id="wn${i}" value="${r.next_w||""}"><br>

        💰 <input type="number" class="money" id="paid${i}" placeholder="đã trả" value="${r.paid||""}">
        🔥 <input type="number" class="debtold" id="oldDebt${i}" placeholder="nợ cũ" value="${r.oldDebt||""}">
        🏦 <input type="number" class="deposit" id="deposit${i}" placeholder="tiền cọc" value="${r.deposit||""}">

        <div style="margin-top:6px;">
          ❗ Tổng nợ:
          <b style="color:#f87171">
            ${r.total ? (totalDebt>0 ? totalDebt.toLocaleString()+"đ" : "0đ") : "--"}
          </b>
        </div>

        <button class="calc" onclick="calc(${i})">TÍNH</button>
        <button class="paid" onclick="savePaid(${i})">LƯU TRẢ + NỢ + CỌC</button>
        <button class="print" onclick="bill(${i})">IN</button>
        <button class="clear" onclick="del(${i})">XÓA</button>
      </div>
    </div>
    `;
  }

  document.getElementById("list").innerHTML = html;
  document.getElementById("sumBox").innerText = totalMoney.toLocaleString()+"đ";
  document.getElementById("unpaidBox").innerText = unpaidCount;
}

function setName(i,v){
  data[m][i]={...getRoom(i),name:v};
  save();
}

function calc(i){
  let r=getRoom(i);

  let e_old=+document.getElementById("eo"+i).value||0;
  let e_new=+document.getElementById("en"+i).value||0;
  let w_old=+document.getElementById("wo"+i).value||0;
  let w_new=+document.getElementById("wn"+i).value||0;

  let price=(i==7)?900000:1000000;
  let total=price+(e_new-e_old)*5000+(w_new-w_old)*10000;

  data[m][i]={...r,e_old,w_old,next_e:e_new,next_w:w_new,total};

  save();
  render();
}

function savePaid(i){
  let val = +document.getElementById("paid"+i).value||0;
  let oldDebt = +document.getElementById("oldDebt"+i).value||0;
  let deposit = +document.getElementById("deposit"+i).value||0;

  let r=getRoom(i);

  data[m][i]={...r,paid:val,oldDebt:oldDebt,deposit:deposit};
  save();
  render();
}

function del(i){
  delete data[m][i];
  save();
  render();
}

function bill(i){
  let r=getRoom(i);
  let w=window.open("");
  w.document.write(`<h3>Phòng ${i}</h3><p>${r.total}</p>`);
  w.print();
}

initMonth();
render();
</script>

</body>
</html>
